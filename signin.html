<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Success Club 2026</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-shell">
        <a class="brand" href="index.html"><span class="brand-mark">SC</span><span><strong>Success Club</strong><small>Student sign in</small></span></a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-links"><span></span><span></span><span></span></button>
        <div class="nav-links" id="nav-links">
          <a href="index.html">Home</a><a href="status.html">Application Status</a><a href="scholarships.html">Scholarships</a><a href="signup.html">Sign Up</a><a class="active" href="signin.html">Sign In</a><a href="apply.html">Apply</a><a href="admin.html">Admin</a>
        </div>
      </nav>
    </header>
    <main>
      <section class="section">
        <div class="account-grid">
          <form class="auth-card" id="login-form">
            <h3>Student sign in</h3>
            <label>Email<input name="email" type="email" placeholder="student@gmail.com" required /></label>
            <label>Password<input name="password" type="password" required /></label>
            <button class="button primary full" type="submit">Sign In</button>
            <button class="button secondary full" data-logout type="button">Sign Out</button>
            <div class="success-message" id="login-message" role="status" aria-live="polite"></div>
          </form>
          <div class="auth-card">
            <h3>Email verification</h3>
            <p class="admin-help">If your account is not verified yet, sign in first and you will be sent to the OTP page.</p>
            <a class="button secondary full" href="verify.html">Open OTP Page</a>
            <div class="success-message show" data-student-status>Not signed in.</div>
          </div>
        </div>
      </section>
    </main>
    <footer><p>Need an account?</p><a href="signup.html">Create account</a></footer>
    <script src="assets/js/script.js"></script>
  </body>
</html>
