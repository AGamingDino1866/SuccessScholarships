<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pakistan Only - Success Factor</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preload" href="assets/css/styles.css" as="style" />
    <link rel="stylesheet" href="assets/css/styles.css" media="print" onload="this.media='all'" />
    <style>
      :root{--ink:#01386A;--muted:#01386A;--paper:#ffffff;--card:#fff;--rose:#01386A;--line:rgba(1,56,106,.14);--shadow:0 24px 70px rgba(1,56,106,.14)}body{min-height:100vh;margin:0;display:grid;place-items:center;background:var(--paper);color:var(--ink);padding:24px}.deny-card{width:min(560px,100%);border:1px solid var(--line);border-radius:18px;background:var(--card);box-shadow:var(--shadow);padding:clamp(28px,5vw,48px);text-align:center}.brand-mark{margin:0 auto 18px}.eyebrow{font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--rose);font-size:.78rem}.deny-card h1{font-size:clamp(2.2rem,6vw,4rem);line-height:1;margin:8px 0 14px}.deny-card p{color:var(--muted);line-height:1.7;margin:0}
    </style>
  </head>
  <body>
    <main class="deny-card">
      <span class="brand-mark">SF</span>
      <p class="eyebrow">Notice</p>
      <h1>Pakistan only.</h1>
      <p>This site is only for people in Pakistan right now.</p>
    </main>
  </body>
</html>
