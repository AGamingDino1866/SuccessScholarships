<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Success Club 2026</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      body{background:#f7f8f4;color:#173d31}.auth-shell{width:min(960px,calc(100% - 32px));margin:38px auto 86px;display:grid;grid-template-columns:.9fr 1fr;gap:22px}.auth-hero,.auth-panel{border:1px solid rgba(23,61,49,.14);border-radius:18px;background:#fff;box-shadow:0 24px 70px rgba(23,33,28,.14)}.auth-hero{min-height:560px;padding:clamp(28px,5vw,56px);background:linear-gradient(135deg,rgba(23,61,49,.94),rgba(23,61,49,.62)),url("assets/education-hero.png") center/cover;color:#fff;display:grid;align-content:end}.auth-hero h1{font-size:clamp(2.3rem,6vw,5rem);line-height:.98;margin:10px 0 18px}.auth-hero p{color:rgba(255,255,255,.86);line-height:1.7}.auth-panel{padding:30px;align-self:stretch;display:grid;align-content:center}.auth-tabs{display:flex;gap:8px;padding:6px;border:1px solid rgba(23,61,49,.14);border-radius:999px;background:#f7f8f4;margin-bottom:22px}.auth-tabs button{flex:1;border:0;border-radius:999px;padding:12px 14px;background:transparent;color:#173d31;font:inherit;font-weight:900;cursor:pointer}.auth-tabs button.active{background:#173d31;color:#fff}.auth-form{display:grid;gap:14px}.auth-form label{display:grid;gap:8px;font-weight:900}.auth-form input{width:100%;padding:15px 16px;border:1px solid rgba(23,61,49,.14);border-radius:12px;background:#fff;color:#173d31;font:inherit}.auth-message{min-height:24px;color:#8d315b;font-weight:900;line-height:1.5}.auth-message.success{color:#173d31}@media(max-width:820px){.auth-shell{grid-template-columns:1fr}.auth-hero{min-height:360px}}@media(max-width:640px){.auth-shell{width:min(100% - 24px,960px);margin-top:18px}.auth-hero,.auth-panel{border-radius:12px}.auth-panel{padding:22px}.auth-hero h1{font-size:clamp(2.1rem,10vw,3.4rem)}}
    </style>
  </head>
  <body>
    <header class="site-header centered-header"><nav class="nav-shell centered-nav" aria-label="Main navigation"><a class="brand compact-brand logo-only" href="index.html" aria-label="Success Club home"><span class="brand-mark">SC</span></a><button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-links"><span></span><span></span><span></span></button><div class="nav-links" id="nav-links"><a href="index.html">Home</a><a href="apply.html">My Applications</a><a href="resources.html">Resources</a><a class="active" href="auth.html">Sign In</a><a href="contact.html">Contact Us</a></div></nav></header>
    <main class="auth-shell">
      <section class="auth-hero"><p class="eyebrow">Student account</p><h1>Sign in before applying.</h1><p>Create an account with your email so your application can be saved and checked later.</p></section>
      <section class="auth-panel"><div class="auth-tabs"><button class="active" type="button" data-mode="signin">Sign In</button><button type="button" data-mode="signup">Sign Up</button></div><form class="auth-form" id="auth-form"><label>Email<input name="email" type="email" autocomplete="email" required /></label><label>Password<input name="password" type="password" autocomplete="current-password" minlength="6" required /></label><button class="button" type="submit">Sign In</button><p class="auth-message" id="auth-message" role="status" aria-live="polite"></p></form></section>
    </main>
    <footer><p>Success Club 2026</p><a href="apply.html">My Applications</a></footer>
    <script src="assets/js/script.js?v=auth-1"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
      const firebaseConfig={apiKey:"AIzaSyAw65XzclDbj2AUyHKlPKP0dufaoqpd8OY",authDomain:"successscholarships-2026.firebaseapp.com",projectId:"successscholarships-2026",storageBucket:"successscholarships-2026.firebasestorage.app",messagingSenderId:"548307406445",appId:"1:548307406445:web:821b1aa139ecdb0ac2f964",measurementId:"G-7X02YSZCZ0"};
      const app=initializeApp(firebaseConfig);const auth=getAuth(app);const form=document.querySelector('#auth-form');const message=document.querySelector('#auth-message');const submit=form.querySelector('button[type="submit"]');let mode='signin';
      document.querySelectorAll('[data-mode]').forEach((button)=>button.addEventListener('click',()=>{mode=button.dataset.mode;document.querySelectorAll('[data-mode]').forEach((tab)=>tab.classList.toggle('active',tab===button));submit.textContent=mode==='signin'?'Sign In':'Create Account';message.textContent='';message.classList.remove('success');}));
      form.addEventListener('submit',async(event)=>{event.preventDefault();const data=new FormData(form);const email=String(data.get('email')||'').trim();const password=String(data.get('password')||'');message.textContent=mode==='signin'?'Signing in...':'Creating account...';try{if(mode==='signin'){await signInWithEmailAndPassword(auth,email,password);}else{await createUserWithEmailAndPassword(auth,email,password);}message.textContent='Success. Opening My Applications...';message.classList.add('success');window.setTimeout(()=>{window.location.href='apply.html';},700);}catch(error){message.classList.remove('success');message.textContent=error.message.replace('Firebase: ','');}});
      onAuthStateChanged(auth,(user)=>{if(user){message.textContent=`Signed in as ${user.email}`;message.classList.add('success');}});
    </script>
  </body>
</html>
