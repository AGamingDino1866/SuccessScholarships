    <style>
      :root{--ink:#173d31;--muted:#607066;--paper:#f7f8f4;--card:#fff;--rose:#d56b91;--gold:#f1b84b;--line:rgba(23,61,49,.14);--shadow:0 24px 70px rgba(23,61,49,.14)}body{background:var(--paper);color:var(--ink)}.centered-header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.9);border-bottom:1px solid rgba(23,61,49,.08);backdrop-filter:blur(18px)}.centered-nav{position:relative;min-height:82px;justify-content:center}.centered-nav .logo-only{position:absolute;left:50px;top:50%;transform:translateY(-50%)}.logo-only span+span{display:none}.centered-nav .nav-links{padding:8px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.9);box-shadow:0 16px 40px rgba(23,61,49,.1)}.nav-links a{border-radius:999px}.nav-links a:hover{background:#2c2c85;color:white}.status-shell{width:min(980px,calc(100% - 32px));margin:36px auto 84px;display:grid;gap:20px}.status-hero,.lookup-card,.result-card{border:1px solid var(--line);border-radius:18px;background:var(--card);box-shadow:var(--shadow)}.status-hero{min-height:360px;padding:clamp(28px,5vw,58px);background:linear-gradient(135deg,rgba(23,61,49,.95),rgba(23,61,49,.68)),url("assets/education-hero.png") center/cover;color:#fff;display:grid;align-content:end}.eyebrow{font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--rose);font-size:.78rem}.status-hero .eyebrow{color:#ffffff}.status-hero h1{font-size:clamp(2.4rem,6vw,5.2rem);line-height:.98;margin:10px 0 18px}.status-hero p{max-width:720px;color:rgba(255,255,255,.86);line-height:1.7}.lookup-card,.result-card{padding:28px}.lookup-form{display:grid;gap:14px}.lookup-form label{display:grid;gap:8px;font-weight:900;color:var(--ink)}.lookup-form input{width:100%;padding:15px 16px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);font:inherit;text-transform:uppercase}.lookup-form small{color:var(--muted);line-height:1.5}.button{border-radius:999px}.result-card{display:none}.result-card.show{display:block}.result-card h2{font-size:clamp(1.9rem,4vw,3rem);line-height:1;margin:0 0 12px}.result-card h3{font-size:1.3rem;margin:16px 0 10px;color:#173d31}.result-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:18px}.result-grid div{padding:14px;border-radius:12px;background:#eef3eb}.result-grid span{display:block;color:var(--muted);font-size:.78rem;font-weight:900;text-transform:uppercase}.result-grid strong{display:block;margin-top:5px;overflow-wrap:anywhere}.result-message{margin-top:16px;color:var(--muted);line-height:1.7}.receipt-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.receipt-note{margin-top:16px;padding:14px;border-radius:12px;background:#eef3eb;color:var(--muted);line-height:1.6}.print-receipt{display:none}.error{color:#c0392b;font-weight:900;padding:12px;background:#fadbd8;border-radius:8px;margin:10px 0}.success-msg{color:#27ae60;font-weight:900;padding:12px;background:#d5f4e6;border-radius:8px;margin:10px 0}.not-found-form{display:grid;gap:12px;margin-top:20px;padding:20px;background:#f0f0f0;border-radius:12px}.not-found-form label{display:grid;gap:6px;font-weight:900}.not-found-form input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:8px;font-size:.95rem}.not-found-form button{width:100%}@supports(content-visibility:auto){section{content-visibility:auto;contain-intrinsic-size:auto 500px}}@media(max-width:920px){.centered-nav{justify-content:space-between}.centered-nav .logo-only{position:static;transform:none}.result-grid{grid-template-columns:1fr}}@supports(content-visibility:auto){section{content-visibility:auto;contain-intrinsic-size:auto 500px}}@media(max-width:640px){.status-shell{width:min(100% - 24px,980px);margin-top:16px}.status-hero,.lookup-card,.result-card{border-radius:12px}.lookup-card,.result-card{padding:20px}.status-hero{min-height:320px;padding:24px}.status-hero h1{font-size:clamp(2rem,10vw,3.4rem)}.receipt-actions .button{width:100%}}@media print{body{background:#fff;color:#173d31}.site-header,.status-hero,.lookup-card,footer,.receipt-actions,.receipt-note{display:none!important}.status-shell{width:100%;margin:0;display:block}.result-card{display:block!important;border:0!important;box-shadow:none!important;padding:0!important}.screen-result{display:none!important}.print-receipt{display:block!important;padding:34px;font-family:Arial,sans-serif}.print-head{border-bottom:3px solid #173d31;padding-bottom:18px;margin-bottom:24px}.print-head strong{display:block;font-size:28px}.print-head span{color:#173d31}.print-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}.print-grid div{border:1px solid rgba(23,61,49,.22);padding:14px;border-radius:8px}.print-grid span{display:block;color:#173d31;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}.print-grid b{display:block;margin-top:6px;font-size:16px;overflow-wrap:anywhere}.print-message{border:1px solid rgba(23,61,49,.22);border-radius:8px;padding:16px;line-height:1.6}.print-foot{margin-top:28px;color:#173d31;font-size:12px;border-top:1px solid rgba(23,61,49,.2);padding-top:14px}}
    </style>
  </head>
  <body>
    <header class="site-header centered-header"><nav class="nav-shell centered-nav" aria-label="Main navigation"><a class="brand compact-brand logo-only" href="index.html" aria-label="Success Factor home"><span class="brand-mark">SF</span></a><button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-links" aria-label="Toggle navigation menu"><span></span><span></span><span></span></button><div class="nav-links" id="nav-links"><a href="index.html">Home</a><a href="apply.html">Apply</a><a class="active" href="status.html">Status</a><a href="contact.html">Contact Us</a></div></nav></header>
    <main class="status-shell">
      <section class="status-hero"><p class="eyebrow">Check status</p><h1>Check your update.</h1><p>Put in your ID to see the latest news. You can save or print it.</p></section>
      <section class="lookup-card"><form class="lookup-form" id="status-form"><label>Your ID<input type="text" name="applicationId" placeholder="SF2026-AB123" autocomplete="off" required /></label><small>IDs start with <strong>SF2026</strong>. Old <strong>SC2026</strong> IDs also work.</small><button class="button" type="submit">Check status</button></form></section>
      <section class="result-card" id="status-result" aria-live="polite"></section>
    </main>
    <footer><p>Success Factor</p><a href="apply.html">Apply</a></footer><script src="assets/js/script.js?v=status-print-1"></script><script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAw65XzclDbj2AUyHKlPKP0dufaoqpd8OY",
        authDomain: "successscholarships-2026.firebaseapp.com",
        projectId: "successscholarships-2026",
        storageBucket: "successscholarships-2026.firebasestorage.app",
        messagingSenderId: "548307406445",
        appId: "1:548307406445:web:821b1aa139ecdb0ac2f964",
        measurementId: "G-7X02YSZCZ0"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const form = document.querySelector('#status-form');
      const result = document.querySelector('#status-result');
      const show = (html) => { result.innerHTML = html; result.classList.add('show'); };
      const escapeHtml = (value) => String(value || '').replace(/[&<>'"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
      const today = () => new Intl.DateTimeFormat('en-GB', { dateStyle: 'medium', timeStyle: 'short', timeZone: 'Asia/Karachi' }).format(new Date());
      const copyText = async (text) => {
        try {
          await navigator.clipboard.writeText(text);
          window.alert('Application ID copied.');
        } catch {
          window.prompt('Copy this application ID:', text);
        }
      };

      result.addEventListener('click', (event) => {
        const printButton = event.target.closest('[data-print-receipt]');
        if (printButton) window.print();
        const copyButton = event.target.closest('[data-copy-id]');
        if (copyButton) copyText(copyButton.dataset.copyId || '');
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const data = new FormData(form);
        const applicationId = String(data.get('applicationId') || '').trim().toUpperCase();
        if (!applicationId) { show('<p class="error">Put in your ID first.</p>'); return; }
        show('<p>Looking for your status...</p>');
        try {
          const snapshot = await getDoc(doc(db, 'application_status', applicationId));
          if (!snapshot.exists()) {
            show(`<h2>ID Not Found</h2><p class="result-message">We could not find application ID <strong>${escapeHtml(applicationId)}</strong> in our system. Check the spelling carefully (IDs start with SF2026 or SC2026).</p><h3>What should you do?</h3><ul style="margin-left:20px;line-height:1.8;"><li>Check your confirmation email for the correct ID</li><li>Try your ID again (it's case-sensitive)</li><li>Contact us for assistance</li></ul>`);
            return;
          }
          const record = snapshot.data();
          const resolvedId = escapeHtml(record.application_id || applicationId);
          const student = escapeHtml(record.student_name || 'Applicant');
          const city = escapeHtml(record.city || 'Not listed');
          const status = escapeHtml(record.status || 'Received');
          const updated = escapeHtml(record.updated_at || 'Not listed');
          const message = escapeHtml(record.message || 'No extra message has been added yet.');
          const printedAt = escapeHtml(today());
          show(`<div class="screen-result"><h2>${status}</h2><div class="result-grid"><div><span>Application ID</span><strong>${resolvedId}</strong></div><div><span>Student</span><strong>${student}</strong></div><div><span>City</span><strong>${city}</strong></div><div><span>Updated</span><strong>${updated}</strong></div></div><p class="result-message">${message}</p><div class="receipt-actions"><button class="button" type="button" data-print-receipt>Print or save</button><button class="button secondary" type="button" data-copy-id="${resolvedId}">Copy ID</button><a class="button secondary" href="contact.html">Contact us</a></div><p class="receipt-note">You can print this page or save it as a PDF.</p></div><section class="print-receipt"><div class="print-head"><strong>Success Factor</strong><span>Application Status Receipt</span></div><div class="print-grid"><div><span>Application ID</span><b>${resolvedId}</b></div><div><span>Status</span><b>${status}</b></div><div><span>Student</span><b>${student}</b></div><div><span>City</span><b>${city}</b></div><div><span>Last Updated</span><b>${updated}</b></div><div><span>Printed</span><b>${printedAt}</b></div></div><div class="print-message"><span>Status Message</span><p>${message}</p></div><p class="print-foot">For help, contact successscholarships2026@gmail.com. Keep this receipt with your application ID.</p></section>`);
        } catch (error) {
          show('<p class="error">We cannot connect right now. Try again, or email us if the ID is right.</p>');
        }
      });
    </script>
      <script src="https://js.puter.com/v2/"></script>
      <script src="assets/js/read-aloud.js"></script>
  </body>
</html>
